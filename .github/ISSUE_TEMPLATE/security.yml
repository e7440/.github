name: Security concern
description: Report a potential security vulnerability for maintainer review.
title: "Security: <short summary>"
labels:
  - security
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        > **Important:** Do NOT include exploit details, credentials, or sensitive data in this public form.
        > For critical vulnerabilities, use GitHub's private [Security Advisories](../../security/advisories/new) instead.

  - type: dropdown
    id: severity
    attributes:
      label: Estimated severity
      options:
        - Critical
        - High
        - Medium
        - Low
        - Informational / hardening suggestion
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: High-level description without exposing sensitive details publicly.
      placeholder: "Describe the type of issue and area affected — avoid exploit specifics here."
      render: markdown
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Potential impact
      description: What could an attacker do, or what data/system is at risk?
      placeholder: "e.g. unauthenticated access, data exposure, privilege escalation..."
      render: markdown
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested mitigation
      description: Optional — any ideas for a fix or workaround.
      render: markdown
    validations:
      required: false
