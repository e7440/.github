name: Regression
description: Something that used to work is now broken.
title: "Regression: <short summary>"
labels:
  - regression
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this when behavior changed between versions or commits.

  - type: input
    id: last-working
    attributes:
      label: Last known working version / commit
      placeholder: "vX.Y.Z or commit SHA"
    validations:
      required: true

  - type: input
    id: broken-in
    attributes:
      label: Broken in version / commit
      placeholder: "vX.Y.Z or commit SHA"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What used to work, and what happens now?
      placeholder: "Describe the expected vs current behavior."
      render: markdown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, platform, versions, and relevant infra context.
      placeholder: "NixOS, k3s, Docker, GitHub Actions, etc."
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / diagnostics
      description: Relevant output, stack traces, or diffs (redact secrets).
      render: markdown
    validations:
      required: false
